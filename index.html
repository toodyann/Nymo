<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050505" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Nymo</title>
    <link id="appFavicon" rel="icon" type="image/png" href="./pwa/favicon-dark.png?v=1" />
    <link id="appFaviconShort" rel="shortcut icon" type="image/png" href="./pwa/favicon-dark.png?v=1" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link id="appAppleTouchIcon" rel="apple-touch-icon" href="./pwa/favicon-dark.png?v=1" />
    <script>
      (() => {
        let savedTheme = '';
        try {
          savedTheme = localStorage.getItem('orion_theme') || '';
        } catch {}
        const prefersDark = window.matchMedia
          ? window.matchMedia('(prefers-color-scheme: dark)').matches
          : true;
        const isDark = savedTheme === 'dark' || (savedTheme !== 'light' && prefersDark);
        document.documentElement.classList.toggle('dark-theme', isDark);
        const fixedIconHref = './pwa/favicon-dark.png?v=1';
        document.getElementById('appFavicon')?.setAttribute('href', fixedIconHref);
        document.getElementById('appFaviconShort')?.setAttribute('href', fixedIconHref);
        document.getElementById('appAppleTouchIcon')?.setAttribute('href', fixedIconHref);
      })();
    </script>

    <link rel="stylesheet" href="./src/styles/main.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
          "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script type="module" src="./src/scripts/bootstrap.js"></script>
  </body>
</html>
